name: Build JOSS Paper

on:
  push:
    paths:
      - 'paper/**'
      - '.github/workflows/joss-paper.yml'
  pull_request:
    paths:
      - 'paper/**'

jobs:
  build-paper:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build paper
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/paper:/data \
            -e JOURNAL=joss \
            openjournals/inara

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/paper.pdf