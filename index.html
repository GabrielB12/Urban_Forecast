<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lixeira Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Dados da Lixeira</h1>
    
    <table id="data-table">
        <thead>
            <tr>
                <!-- As colunas serão geradas com base na primeira linha de dados -->
            </tr>
        </thead>
        <tbody id="table-body">
            <!-- O conteúdo será inserido via JavaScript -->
        </tbody>
    </table>

    <!-- Seção para exibir as barras de progresso fora da tabela -->
    <div class="progress-container" id="progress-container"></div>

    <div class="mapa" id="mapa"></div>

    <script src="script.js"></script>
</body>
</html>
