<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilha e Níveis de Preenchimento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        #trash-status {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .trash-container {
            text-align: center;
        }

        .trash {
            width: 60px;
            height: 100px;
            border: 2px solid black;
            position: relative;
            background: #f0f0f0;
        }

        .trash-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: green;
        }
    </style>
</head>
<body>
    <h1>Dados do Google Sheets</h1>

    <!-- Tabela da planilha -->
    <table border="1">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
    </table>

    <!-- Lixeiras -->
    <div id="trash-status">
        <div id="trash-D2" class="trash-container">
            <div class="trash">
                <div class="trash-fill"></div>
            </div>
            <p>Lixeira D2</p>
        </div>
        <div id="trash-H2" class="trash-container">
            <div class="trash">
                <div class="trash-fill"></div>
            </div>
            <p>Lixeira H2</p>
        </div>
        <div id="trash-L2" class="trash-container">
            <div class="trash">
                <div class="trash-fill"></div>
            </div>
            <p>Lixeira L2</p>
        </div>
    </div>

    <script>
        fetch('/index.php') // URL do seu endpoint PHP
            .then(response => response.json())
            .then(data => {
                const tableHead = document.getElementById('table-head');
                const tableBody = document.getElementById('table-body');

                // Adiciona o cabeçalho da tabela
                const headerRow = document.createElement('tr');
                data[0].forEach(cell => {
                    const th = document.createElement('th');
                    th.textContent = cell;
                    headerRow.appendChild(th);
                });
                tableHead.appendChild(headerRow);

                // Adiciona as linhas da tabela
                data.slice(1).forEach(row => {
                    const tr = document.createElement('tr');
                    row.forEach(cell => {
                        const td = document.createElement('td');
                        td.textContent = cell;
                        tr.appendChild(td);
                    });
                    tableBody.appendChild(tr);
                });

                // Atualiza os níveis de preenchimento
                const updateTrash = (trashId, value) => {
                    const trash = document.querySelector(`#${trashId} .trash-fill`);
                    trash.style.height = `${value}%`;
                    trash.style.backgroundColor = value > 75 ? 'red' : value > 50 ? 'orange' : 'green';
                };

                const d2Value = parseInt(data[1][3]) || 0; // Coluna D2
                const h2Value = parseInt(data[1][7]) || 0; // Coluna H2
                const l2Value = parseInt(data[1][11]) || 0; // Coluna L2

                updateTrash('trash-D2', d2Value);
                updateTrash('trash-H2', h2Value);
                updateTrash('trash-L2', l2Value);
            })
            .catch(error => console.error('Erro ao carregar os dados:', error));
    </script>
</body>
</html>
