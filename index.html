<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Monitor Lixeiras</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Monitor Lixeiras</h1>
  </header>

  <div class="top-row">
    <div class="control" style="flex:1; min-width:220px;">
      <label for="sensorFilter" class="small" style="margin-right:8px">Filtrar por sensor</label>
      <select id="sensorFilter"><option value="">(Todos)</option></select>
      <button id="refreshBtn" class="primary" style="margin-left:8px">Atualizar</button>
    </div>
    <div style="margin-left:auto" class="small">Atualização automática a cada 5s</div>
  </div>

  <div class="grid">
    <div class="card">
      <h3 style="margin-top:0;margin-bottom:8px">Últimos registros</h3>
      <div style="overflow:auto; max-height:64vh;">
        <table id="dataTable" aria-label="Tabela de leituras">
          <thead>
            <tr>
              <th>Sensor</th>
              <th>Nome</th>
              <th>Endereço</th>
              <th>Distance (cm)</th>
              <th>Preenchimento</th>
              <th>Timestamp</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <aside class="side">
      <div class="card info-card">
        <div style="display:flex; align-items:center; gap:12px;">
          <div style="width:12px;height:12px;border-radius:3px;background:var(--accent)"></div>
          <div>
            <div style="font-weight:700">Mini-mapa</div>
            <div class="small">Clique em "Ver mapa" para centralizar no endereço da lixeira.</div>
          </div>
        </div>
      </div>

      <div class="map-card card">
        <div id="mapContainer" style="width:100%;height:100%;">
          <div class="no-address" id="noAddressMsg">Selecione um sensor ou clique em "Ver mapa" em uma linha.</div>
        </div>
      </div>
    </aside>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
